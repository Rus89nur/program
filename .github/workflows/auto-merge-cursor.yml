name: Auto Merge Cursor PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request number to merge
        required: true
        type: string

permissions:
  actions: write
  checks: read
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: auto-merge-cursor-${{ github.event.pull_request.number || inputs.pull_request }}
  cancel-in-progress: true

jobs:
  merge:
    name: Merge Cursor pull request
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.state == 'open' &&
        !github.event.pull_request.draft &&
        github.event.pull_request.base.ref == 'main' &&
        startsWith(github.event.pull_request.head.ref, 'cursor/') &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    steps:
      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pull_request }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          PR_NUMBER="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request number was provided."
            exit 1
          fi

          PR_JSON="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json state,isDraft,baseRefName,headRefName,headRepository,mergeStateStatus)"
          STATE="$(echo "$PR_JSON" | jq -r '.state')"
          IS_DRAFT="$(echo "$PR_JSON" | jq -r '.isDraft')"
          BASE_REF="$(echo "$PR_JSON" | jq -r '.baseRefName')"
          HEAD_REF="$(echo "$PR_JSON" | jq -r '.headRefName')"
          HEAD_REPO="$(echo "$PR_JSON" | jq -r '.headRepository.nameWithOwner')"

          if [ "$STATE" != "OPEN" ]; then
            echo "PR #$PR_NUMBER is not open; skipping."
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is draft; skipping."
            exit 0
          fi

          if [ "$BASE_REF" != "main" ]; then
            echo "PR #$PR_NUMBER targets '$BASE_REF', not 'main'; skipping."
            exit 0
          fi

          case "$HEAD_REF" in
            cursor/*) ;;
            *)
              echo "PR #$PR_NUMBER head branch '$HEAD_REF' is not a Cursor branch; skipping."
              exit 0
              ;;
          esac

          if [ "$HEAD_REPO" != "$REPOSITORY" ]; then
            echo "PR #$PR_NUMBER comes from '$HEAD_REPO', not '$REPOSITORY'; skipping."
            exit 0
          fi

          READY_TO_MERGE=false
          for attempt in $(seq 1 12); do
            MERGE_STATE="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json mergeStateStatus --jq '.mergeStateStatus')"
            case "$MERGE_STATE" in
              CLEAN|HAS_HOOKS)
                echo "PR #$PR_NUMBER is mergeable: $MERGE_STATE"
                READY_TO_MERGE=true
                break
                ;;
              UNKNOWN)
                echo "Mergeability is unknown; waiting before retry $attempt/12."
                sleep 10
                ;;
              *)
                echo "PR #$PR_NUMBER is not ready to merge: $MERGE_STATE"
                exit 1
                ;;
            esac
          done

          if [ "$READY_TO_MERGE" != "true" ]; then
            echo "PR #$PR_NUMBER mergeability stayed UNKNOWN; skipping."
            exit 1
          fi

          gh pr merge "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --squash \
            --delete-branch \
            --body "Automatically merged Cursor PR #$PR_NUMBER."

          gh workflow run "Deploy Gazprom Web" --repo "$REPOSITORY" --ref main
